name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d erp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp_test?schema=public
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Verify migration scripts
        working-directory: .
        run: bash scripts/verify-migrations.sh
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Run migrations
        run: npx prisma migrate deploy
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm test

  perf:
    runs-on: ubuntu-latest
    needs: [backend]
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d erp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/erp_test?schema=public
      JWT_SECRET: ci-test-secret
      SEED_ADMIN_PASSWORD: change-me-admin
      SEED_DEMO_PASSWORD: change-me-demo
      PORT: 3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Verify migration scripts
        working-directory: .
        run: bash scripts/verify-migrations.sh
      - name: Prepare database
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed
      - name: Build backend
        run: npm run build
      - name: Install k6
        uses: grafana/setup-k6-action@v1
      - name: k6 load test
        working-directory: .
        run: |
          cd backend
          nohup npm run start:prod > ../backend.log 2>&1 &
          cd ..
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:3000/api/health || (cat backend.log && exit 1)
          k6 run tests/perf/k6-ci.js
        env:
          API_BASE: http://localhost:3000
          PERF_PASSWORD: change-me-admin
          SEED_ADMIN_PASSWORD: change-me-admin

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images
        run: |
          docker compose -f docker/docker-compose.yml build

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
      - name: Install root dependencies
        run: npm install
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps
      - name: E2E smoke tests
        run: npm run test:e2e
        env:
          CI: true
