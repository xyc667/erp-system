apiVersion: v1
kind: Secret
metadata:
  name: erp-secrets
  namespace: erp
type: Opaque
stringData:
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/erp?schema=public
  JWT_SECRET: change-me-in-production
  REDIS_URL: redis://redis:6379

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: erp-config
  namespace: erp
data:
  NODE_ENV: production
  PORT: "3000"
  CORS_ORIGIN: http://erp.local
  JWT_EXPIRES_IN: 15m
  REFRESH_TOKEN_EXPIRES_IN: 7d
  RUN_SEED: "false"
